name: api
description: API security scan — REST, GraphQL, gRPC, authentication
plugins:
  - api_enum
  - api_versioning
  - api_fuzzing
  - graphql_probe
  - graphql_injection
  - graphql_nuclear
  - graphql_ast_bomb
  - grpc_scanner
  - jwt_analyzer
  - oauth_scanner
  - saml_scanner
  - oidc_poisoning
  - mass_assignment
  - idor_scanner
  - rate_limit_check
  - ssrf_scanner
  - sqli_scanner
  - nosql_scanner
  - cors_checker
  - host_header_injection
  - http_methods
  - secrets_scraper
  - tech_fingerprint
  - fuzzing_engine
