# Stale Bot — Auto-close inactive issues/PRs
# Cascavel Security Framework | RET Tecnologia

# Number of days of inactivity before an issue becomes stale
daysUntilStale: 90

# Number of days of inactivity before a stale issue is closed
daysUntilClose: 14

# Issues/PRs with these labels will never be considered stale
exemptLabels:
  - 'security'
  - 'bug'
  - 'enhancement'
  - 'pinned'
  - 'good first issue'
  - 'help wanted'
  - 'in-progress'
  - 'wip'

# Label to apply when marking as stale
staleLabel: 'stale'

# Comment to post when marking as stale
markComment: >
  This issue has been automatically marked as **stale** because it has not had
  recent activity (90 days). It will be closed in 14 days if no further activity
  occurs. If this issue is still relevant, please leave a comment or remove the
  `stale` label.


  Thank you for your contributions to Cascavel! 🐍

  — *[RET Tecnologia](https://rettecnologia.org)*

# Comment to post when closing a stale issue
closeComment: >
  This issue has been automatically closed due to inactivity.
  Feel free to reopen it if the issue persists or becomes relevant again.

# Comment to post when unstaling
unmarkComment: false

# Only stale issues, not PRs (PRs have different lifecycle)
only: issues
