# Fuzzing — Atheris (Google's Python fuzzer)
# Cascavel Security Framework | RET Tecnologia
# Purpose: Satisfies OpenSSF Scorecard "Fuzzing" check

name: Fuzzing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "15 7 * * 1"

permissions: {}

jobs:
  fuzz:
    name: 🧬 Atheris Fuzzing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install atheris
          pip install -r requirements.txt

      - name: Run fuzzing (time-limited)
        run: |
          python tests/fuzz_sanitizer.py -atheris_runs=100000 -max_total_time=120
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Fuzzing complete
        if: success()
        run: echo "✅ Fuzzing completed — no crashes found"
