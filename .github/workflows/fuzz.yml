# Fuzzing — Atheris (Google's Python fuzzer)
# Cascavel Security Framework | RET Tecnologia
# Purpose: Satisfies OpenSSF Scorecard "Fuzzing" check

name: Fuzzing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "15 7 * * 1"

permissions: {}

jobs:
  fuzz:
    name: 🧬 Atheris Fuzzing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install atheris
          pip install -r requirements.txt

      - name: Run fuzzing (time-limited)
        run: |
          python tests/fuzz_sanitizer.py -atheris_runs=100000 -max_total_time=120
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Fuzzing complete
        if: success()
        run: echo "✅ Fuzzing completed — no crashes found"
