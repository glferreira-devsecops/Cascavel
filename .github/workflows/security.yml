# ════════════════════════════════════════════════════════════════════════
# Cascavel Security CI — SAST + Dependency Audit + Secret Detection
# RET Tecnologia | https://rettecnologia.org
# ════════════════════════════════════════════════════════════════════════

name: "🐍 Cascavel Security CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  lint:
    name: "🔍 Syntax & Import Check"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "${{ matrix.python-version }}"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Compile check (all .py files)
        run: |
          python -m py_compile cascavel.py
          python -m py_compile report_generator.py
          find plugins/ -name "*.py" -exec python -m py_compile {} \;
          echo "✓ All files compiled on Python ${{ matrix.python-version }}"

  bandit:
    name: "🛡️ Bandit SAST"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: pip install "bandit[sarif]==1.8.6"
      - name: Run Bandit scan
        run: |
          bandit -r cascavel.py report_generator.py plugins/ \
            -c pyproject.toml \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x "**/test_*"
      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  semgrep:
    name: "🔬 Semgrep SAST"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep@sha256:3dab091ee3247fce7e4ed3df9f92b3bd72692c083295f53cec3f135b86404db1 # latest 2026-03-17
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep-results.sarif \
            --exclude "test_*" \
            --exclude "*.md"
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  dependency-audit:
    name: "📦 Dependency CVE Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: pip-audit (CVE check)
        run: |
          pip install pip-audit==2.9.0
          pip-audit --format json --output audit-results.json || true
          pip-audit --desc || true
      - name: Check critical CVE floor versions
        run: |
          python3 << 'PYEOF'
          import importlib.metadata as meta
          checks = {
              "PyJWT": ("2.12.0", "CVE-2022-29217"),
              "reportlab": ("3.6.13", "CVE-2023-33733"),
              "requests": ("2.32.4", "GHSA-9hjg-9r4m-mvj7 + GHSA-9wx4-h78v-vm56"),
              "dnspython": ("2.7.0", "GHSA-3rq5-2g8h-59hc"),
              "pyOpenSSL": ("25.0.0", "GHSA-5pwr-322w-8jr4 + GHSA-vp96-hxj8-p424"),
          }
          failed = False
          for pkg, (min_ver, cve) in checks.items():
              try:
                  ver = meta.version(pkg)
                  parts_cur = [int(x) for x in ver.split(".")]
                  parts_min = [int(x) for x in min_ver.split(".")]
                  if parts_cur < parts_min:
                      print(f"FAIL: {pkg} {ver} < {min_ver} ({cve})")
                      failed = True
                  else:
                      print(f"  OK: {pkg} {ver} >= {min_ver}")
              except meta.PackageNotFoundError:
                  print(f"SKIP: {pkg} not installed")
          if failed:
              raise SystemExit(1)
          PYEOF

  secrets:
    name: "🔑 Secret Detection"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
