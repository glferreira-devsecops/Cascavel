name: "🐍 Cascavel Security CI"
# zizmor: ignore[unpinned-uses]
# zizmor: ignore[superfluous-actions]

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  lint:
    name: "🔍 Syntax & Import Check"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Compile check (all .py files)
        run: |
          python -m py_compile cascavel.py
          python -m py_compile sarif_exporter.py
          python -m py_compile report_generator.py
          find plugins/ -name "*.py" -exec python -m py_compile {} \;
          find tests/ -name "*.py" ! -name "fuzz_*" -exec python -m py_compile {} \;
          echo "✓ All files compiled successfully"

  bandit:
    name: "🛡️ Bandit SAST"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5
        with:
          python-version: "3.12"
      - run: pip install "bandit[sarif]==1.9.4"
      - name: Run Bandit scan
        run: |
          bandit -r cascavel.py sarif_exporter.py report_generator.py plugins/ \
            -c pyproject.toml \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x "**/test_*,**/fuzz_*"
      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@2e230e8fe0ad3a14a340fac8a0a5526c12d146af # v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  semgrep:
    name: "🔬 Semgrep SAST"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep@sha256:3dab091ee3247fce7e4ed3df9f92b3bd72692c083295f53cec3f135b86404db1 # latest 2026-03-17
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep-results.sarif \
            --exclude "test_*" \
            --exclude "docs/*" \
            --exclude "*.md"
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@2e230e8fe0ad3a14a340fac8a0a5526c12d146af # v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  dependency-audit:
    name: "📦 OSV-Scanner Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@347b2c6eeb411f12da34444988771485db83af07 # v1.9.2

  secrets:
    name: "🔑 TruffleHog Secret Detection"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@fe5624c70923355128868cffd647b6e2cfe11443 # v3.81.9
        with:
          path: ./
          extra_args: --debug --only-verified

  actionlint:
    name: "🧹 Actionlint & Zizmor"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@7ce6d8a25c345eb62ed07706d8b671a5bd8cbda6 # v0.5.6
        with:
          inputs: .

  sbom:
    name: "🧾 Generate SBOM & Pip-Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install cyclonedx-bom pip-audit
      - name: Generate SBOM
        run: cyclonedx-py requirements requirements.txt -o sbom.json
      - name: Run pip-audit
        run: pip-audit -r requirements.txt
