# Stale Issues — Auto-close inactive issues
# Cascavel Security Framework | RET Tecnologia

name: Stale Issues

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  stale:
    name: 🧹 Close Stale Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: 'stale'
          exempt-issue-labels: 'security,bug,enhancement,pinned,good first issue,help wanted,in-progress,wip'
          stale-issue-message: >
            This issue has been automatically marked as **stale** because it has not had
            recent activity (90 days). It will be closed in 14 days if no further activity
            occurs. If this issue is still relevant, please leave a comment or remove the
            `stale` label.

            Thank you for your contributions to Cascavel! 🐍
            — *[RET Tecnologia](https://rettecnologia.org)*
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Feel free to reopen it if the issue persists or becomes relevant again.
          operations-per-run: 30
