# ════════════════════════════════════════════════════════════════════════
# Cascavel LTS — Automated Dependency Update & Audit
# RET Tecnologia | https://rettecnologia.org
#
# Runs weekly: checks for outdated deps, CVE floors, version drift.
# If updates are found, creates a PR automatically.
# ════════════════════════════════════════════════════════════════════════

name: "🔄 Dependency Auto-Update"

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday 08:00 UTC
  workflow_dispatch:       # Manual trigger

permissions: {}

jobs:
  audit:
    name: "📦 Audit & Update Dependencies"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Run dependency audit
        id: audit
        run: |
          python3 scripts/update_deps.py --update 2>&1 | tee audit-output.txt
          echo "has_updates=$(git diff --quiet requirements.txt && echo 'false' || echo 'true')" >> "$GITHUB_OUTPUT"

      - name: Compile check after update
        if: steps.audit.outputs.has_updates == 'true'
        run: |
          pip install -r requirements.txt
          python -m py_compile cascavel.py
          python -m py_compile report_generator.py
          find plugins/ -name "*.py" -exec python -m py_compile {} \;
          echo "✅ All files compile with updated deps"

      - name: Create Pull Request
        if: steps.audit.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "deps: auto-update Python dependencies"
          title: "🔄 [Auto] Update Python dependencies"
          body: |
            ## Automated Dependency Update

            This PR was created automatically by the `update_deps.py` script.

            ### Changes
            ```
            $(cat audit-output.txt)
            ```

            ### Verification
            - ✅ All Python files compile successfully with updated deps
            - ⚠️ Please review breaking changes before merging

            ---
            *Generated by [Cascavel LTS Automation](https://github.com/glferreira-devsecops/Cascavel)*
          branch: auto/update-deps
          labels: |
            dependencies
            automated
          delete-branch: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-audit-report
          path: audit-output.txt
          if-no-files-found: ignore
