name: Omni-Distribution Release
# zizmor: ignore[unpinned-uses]
# zizmor: ignore[superfluous-actions]

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-release:
    name: Build Tarballs & PyInstaller
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: |
          pip install pyinstaller requirements.txt
          pip install build twine

      - name: Build Standalone Executable (Linux)
        run: |
          pyinstaller --onefile --name cascavel-linux cascavel.py

      - name: Build PyPI Package
        run: |
          python -m build

      - name: Create Release Archives
        run: |
          mkdir -p release_build/Cascavel
          rsync -av --exclude='.git' --exclude='.github' --exclude='venv' ./ release_build/Cascavel/
          cd release_build
          zip -r ../cascavel-release.zip Cascavel/
          tar -czvf ../cascavel-release.tar.gz Cascavel/

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign Release Assets
        run: |
          cosign sign-blob --yes cascavel-release.tar.gz --bundle cascavel-release.tar.gz.bundle
          cosign sign-blob --yes cascavel-release.zip --bundle cascavel-release.zip.bundle
          cosign sign-blob --yes dist/cascavel-linux --bundle cascavel-linux.bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cascavel-release.zip
            cascavel-release.tar.gz
            cascavel-release.tar.gz.bundle
            cascavel-release.zip.bundle
            dist/cascavel-linux
            cascavel-linux.bundle
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: build-and-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: Publish to NPM
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Docker Hub & GHCR
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ github.repository_owner }}/cascavel:latest
            ghcr.io/${{ github.repository_owner }}/cascavel:latest

  slsa-provenance:
    needs: build-and-release
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ""
