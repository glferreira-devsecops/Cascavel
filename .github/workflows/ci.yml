# Cascavel CI — Lint + Format + Compile + Release Drafter
# RET Tecnologia | https://rettecnologia.org

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Run ruff check
        run: ruff check cascavel.py report_generator.py plugins/ --output-format=github

      - name: Run ruff format check
        run: ruff format --check cascavel.py report_generator.py plugins/

  compile:
    name: 🐍 Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile all Python files
        run: |
          python -m py_compile cascavel.py
          python -m py_compile report_generator.py
          find plugins/ -name "*.py" -exec python -m py_compile {} \;
          echo "✅ All Python files compiled successfully"

  security:
    name: 🔒 Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Run bandit
        run: bandit -r cascavel.py report_generator.py plugins/ -c pyproject.toml -f json -o bandit-report.json

      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          if-no-files-found: ignore

  release-drafter:
    name: 📋 Draft Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
