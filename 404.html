<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Página não encontrada · CASCAVEL</title>
  <meta name="robots" content="noindex, follow" />
  <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->
  <link rel="canonical" href="https://cascavel.pages.dev/" />
  <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/devferreirag/Cascavel/main/docs/cascavel_logo.png" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cyan:#00ffe5;--magenta:#ff2d95;--bg:#030308;--text:#c8d6e5;--text-bright:#f0f4f8;--text-dim:rgba(200,214,229,.5)}
    html,body{height:100%}
    body{
      background:radial-gradient(circle at 50% 30%, rgba(0,255,229,.06), transparent 60%), var(--bg);
      color:var(--text);font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;min-height:100vh;
    }
    .wrap{max-width:560px}
    .code{
      font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:clamp(4rem,18vw,8rem);font-weight:800;line-height:1;
      background:linear-gradient(135deg,var(--cyan),var(--magenta));
      -webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 0 40px rgba(0,255,229,.25);
    }
    h1{color:var(--text-bright);font-size:clamp(1.1rem,4vw,1.6rem);margin:1rem 0 .5rem;letter-spacing:.5px}
    p{color:var(--text-dim);font-size:1rem;margin-bottom:2rem}
    a.home{
      display:inline-block;padding:.8rem 1.6rem;border:1px solid rgba(0,255,229,.4);border-radius:10px;
      color:var(--cyan);text-decoration:none;font-weight:600;transition:all .3s ease;
    }
    a.home:hover{background:rgba(0,255,229,.08);box-shadow:0 0 24px rgba(0,255,229,.25)}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>A rota solicitada não existe. Verifique o endereço ou volte para a página inicial.</p>
    <a class="home" href="/">← Voltar ao início</a>
  </main>
</body>
</html>
